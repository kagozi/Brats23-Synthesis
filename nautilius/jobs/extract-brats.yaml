# extract-brats.yaml - Kubernetes Pod to extract BRATS dataset
apiVersion: v1
kind: Pod
metadata:
  name: extract-brats
  namespace: gai-lina-group
spec:
  restartPolicy: Never
  containers:
  - name: extractor
    image: ubuntu:22.04
    command: ["/bin/bash", "-c"]
    args:
      - |
        set -e
        apt-get update -qq && apt-get install -y -qq unzip
        cd /pvc/data
        echo "Creating extraction directory..."
        mkdir -p brats23
        echo "Extracting BRATS dataset..."
        unzip -q MICCAI-BraTS2023.zip -d brats23
        echo "Extraction complete. Contents:"
        ls -lah brats23/
    volumeMounts:
    - name: brats23-pvc
      mountPath: /pvc/data
  volumes:
  - name: brats23-pvc
    persistentVolumeClaim:
      claimName: brats23-pvc