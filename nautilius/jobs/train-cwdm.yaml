# nautilius/jobs/train-cwdm.yaml
#
# Fast-CWDM — all 4 modalities trained in parallel.
# One Job per modality, all launched with a single kubectl apply.
# Uses kind: Job (controller) to bypass the 32 GB bare-Pod limit.
#
# Deploy:
#   kubectl apply -f nautilius/jobs/train-cwdm.yaml
#
# Monitor:
#   kubectl logs -f job/train-cwdm-t1n -n gai-lina-group
#   kubectl logs -f job/train-cwdm-t1c -n gai-lina-group
#   kubectl logs -f job/train-cwdm-t2w -n gai-lina-group
#   kubectl logs -f job/train-cwdm-t2f -n gai-lina-group
#
# Delete:
#   kubectl delete -f nautilius/jobs/train-cwdm.yaml

# =============================================================================
# t1n
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: train-cwdm-t1n
  namespace: gai-lina-group
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
        - key: nvidia.com/gpu
          operator: Exists
          effect: PreferNoSchedule
      containers:
        - name: trainer
          image: ghcr.io/kagozi/brats23-cwdm:latest
          imagePullPolicy: Always
          env:
            - name: TRAIN_MODALITY
              value: "t1n"
            - name: SAMPLE_STRATEGY
              value: "sampled"
            - name: TIMESTEPS
              value: "100"
            - name: TRAIN_DATA_DIR
              value: "/pvc/data/brats23/train"
            - name: CHECKPOINT_DIR
              value: "/pvc/checkpoints/cwdm"
            - name: WANDB_PROJECT
              value: "brats2023-cwdm"
            - name: WANDB_MODE
              value: "online"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-credentials
                  key: api_key
            - name: WANDB_ENTITY
              valueFrom:
                secretKeyRef:
                  name: wandb-credentials
                  key: entity
          resources:
            requests:
              memory: "20Gi"
              cpu: "12"
              nvidia.com/gpu: "1"
              ephemeral-storage: "0"
            limits:
              memory: "24Gi"
              cpu: "12"
              nvidia.com/gpu: "1"
              ephemeral-storage: "50Gi"
          volumeMounts:
            - name: brats23-vol
              mountPath: /pvc
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: brats23-vol
          persistentVolumeClaim:
            claimName: brats23-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

