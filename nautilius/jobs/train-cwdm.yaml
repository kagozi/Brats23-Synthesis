# nautilius/jobs/train-cwdm.yaml
#
# Fast-CWDM training pod — one pod per modality.
# Data is pre-extracted by prepare-brats23.yaml into brats23-pvc.
# Code is baked into ghcr.io/kagozi/brats23-cwdm:latest via CI/CD.
#
# To train all 4 modalities in parallel, apply this file 4 times
# after changing metadata.name and TRAIN_MODALITY each time:
#   t1n → train-cwdm-t1n
#   t1c → train-cwdm-t1c
#   t2w → train-cwdm-t2w
#   t2f → train-cwdm-t2f
#
# Deploy:
#   kubectl apply -f nautilius/jobs/train-cwdm.yaml
#   kubectl logs -f pod/train-cwdm-t1n -n gai-lina-group
apiVersion: v1
kind: Pod
metadata:
  name: train-cwdm-t1n
  namespace: gai-lina-group
spec:
  restartPolicy: Never

  nodeSelector:
    nautilus.io/linstor: "true"

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                  - NVIDIA-A100-SXM4-80GB
                  - NVIDIA-A100-SXM4-40GB
                  - NVIDIA-A100-PCIe-80GB
                  - NVIDIA-A10
                  - NVIDIA-A10G
                  - NVIDIA-A40
                  - NVIDIA-L40
                  - NVIDIA-RTX-A6000
                  - NVIDIA-GeForce-RTX-3090
                  - NVIDIA-GeForce-RTX-4090
                  - Tesla-V100-SXM2-32GB

  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
    - key: nvidia.com/gpu
      operator: Exists
      effect: PreferNoSchedule

  containers:
    - name: trainer
      image: ghcr.io/kagozi/brats23-cwdm:latest
      imagePullPolicy: Always

      env:
        - name: TRAIN_MODALITY
          value: "t1n"           # t1n | t1c | t2w | t2f
        - name: SAMPLE_STRATEGY
          value: "sampled"
        - name: TIMESTEPS
          value: "100"
        - name: TRAIN_DATA_DIR
          value: "/pvc/data/brats23/train"
        - name: VAL_DATA_DIR
          value: "/pvc/data/brats23/val"
        - name: CHECKPOINT_DIR
          value: "/pvc/checkpoints/cwdm"
        - name: WANDB_PROJECT
          value: "brats2023-cwdm"
        - name: WANDB_MODE
          value: "online"
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-credentials
              key: api_key
        - name: WANDB_ENTITY
          valueFrom:
            secretKeyRef:
              name: wandb-credentials
              key: entity

      resources:
        requests:
          memory: "24Gi"
          cpu: "12"
          nvidia.com/gpu: "1"
        limits:
          memory: "32Gi"
          cpu: "16"
          nvidia.com/gpu: "1"

      volumeMounts:
        - name: brats23-vol
          mountPath: /pvc
        - name: dshm
          mountPath: /dev/shm

  volumes:
    - name: brats23-vol
      persistentVolumeClaim:
        claimName: brats23-pvc
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
