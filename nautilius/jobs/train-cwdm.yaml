# nautilius/jobs/train-cwdm.yaml
#
# Fast-CWDM — all 4 modalities trained in parallel.
# One pod per modality, all launched with a single kubectl apply.
#
# Deploy:
#   kubectl apply -f nautilius/jobs/train-cwdm.yaml
#
# Monitor:
#   kubectl logs -f pod/train-cwdm-t1n -n gai-lina-group
#   kubectl logs -f pod/train-cwdm-t1c -n gai-lina-group
#   kubectl logs -f pod/train-cwdm-t2w -n gai-lina-group
#   kubectl logs -f pod/train-cwdm-t2f -n gai-lina-group

# ── Shared env / volumes template (repeated per pod) ────────────────────────
# Each pod is identical except: metadata.name and TRAIN_MODALITY

# =============================================================================
# t1n
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: train-cwdm-t1n
  namespace: gai-lina-group
spec:
  restartPolicy: Never
  nodeSelector:
    nautilus.io/linstor: "true"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                  - NVIDIA-A100-SXM4-80GB
                  - NVIDIA-A100-PCIe-80GB
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
    - key: nvidia.com/gpu
      operator: Exists
      effect: PreferNoSchedule
  containers:
    - name: trainer
      image: ghcr.io/kagozi/brats23-cwdm:latest
      imagePullPolicy: Always
      env:
        - name: TRAIN_MODALITY
          value: "t1n"
        - name: SAMPLE_STRATEGY
          value: "sampled"
        - name: TIMESTEPS
          value: "100"
        - name: TRAIN_DATA_DIR
          value: "/pvc/data/brats23/train"
        - name: CHECKPOINT_DIR
          value: "/pvc/checkpoints/cwdm"
        - name: WANDB_PROJECT
          value: "brats2023-cwdm"
        - name: WANDB_MODE
          value: "online"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-credentials
              key: api_key
        - name: WANDB_ENTITY
          valueFrom:
            secretKeyRef:
              name: wandb-credentials
              key: entity
      resources:
        requests:
          memory: "48Gi"
          cpu: "12"
          nvidia.com/gpu: "1"
        limits:
          memory: "64Gi"
          cpu: "16"
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: brats23-vol
          mountPath: /pvc
        - name: dshm
          mountPath: /dev/shm
  volumes:
    - name: brats23-vol
      persistentVolumeClaim:
        claimName: brats23-pvc
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi

